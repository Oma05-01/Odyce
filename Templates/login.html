{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odyce | Welcome Back</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles/login.css' %}?v=3">
</head>
<body class="auth-body">

    <div class="auth-wrapper">
        <div class="login-card">
            <header class="auth-header">
                <a href="/" class="auth-logo">ODYCE</a>
                <h1>Welcome Back</h1>
                <p>Access your curated fragrance vault.</p>
            </header>

            <form id="login-form" action="{% url 'login' %}" method="POST">
                {% csrf_token %}

                <div class="input-container">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="concierge@odyce.com" required>
                </div>

                <div class="input-container">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot?</a>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" id="togglePassword" class="eye-btn">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">
                    <span class="btn-text">Authenticate</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <footer class="auth-footer">
                <p>New to Odyce? <a href="{% url 'register' %}">Request Access</a></p>
            </footer>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        // Toggle Password Visibility
        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🔒';
        });

        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.className = "toast"; }, 4000);
        }

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            loader.style.display = "block";

            let formData = new FormData(this);

            fetch("{% url 'login' %}", {
                method: 'POST',
                body: formData,
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'error') {
                    showToast(data.msg, 'error');
                    submitBtn.disabled = false;
                    loader.style.display = "none";
                } else {
                    showToast("Identity verified. Entering Odyce...", 'success');
                    setTimeout(() => { window.location.href = "{% url 'home' %}"; }, 1200);
                }
            })
            .catch(() => {
                showToast("Connection failed.");
                submitBtn.disabled = false;
                loader.style.display = "none";
            });
        });
    </script>
</body>
</html>
